<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container-md">
        <!-- Content here -->
    <h1>Register</h1>
    <form>
        <div class="mb-3">
          <label for="InputFirstName" class="form-label">First Name</label>
          <input type="firstname" [(ngModel)]="user.firstName" name="firstName" class="form-control">
        </div>
        <div class="mb-3">
            <label for="InputLastNAme" class="form-label">Last Name</label>
            <input type="lastname" [(ngModel)]="user.lastName" name="lastName" class="form-control">
          </div>
          <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label">Email address</label>
            <input type="email" [(ngModel)]="user.email" name="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
            <div id="emailHelp" class="form-text">We'll never share your email with anyone else.</div>
          </div>
        <div class="mb-3">
          <label for="exampleInputPassword1" class="form-label">Password</label>
          <input type="password"[(ngModel)]="user.password" name="password" class="form-control" id="exampleInputPassword1">
        </div>
        <div>
            <button type="submit" class="btn btn-primary" (click)="register()">Register</button>
            Already have an account ?&nbsp;<button type="link" class="btn-link">Login</button>
        </div>
      </form>
      </div>
</body>
</html>
